name: "Build & Test (.NET)"

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: ".NET SDK version"
        required: false
        type: string
        default: "8.0"
      project-path:
        description: "Path to the main project or solution"
        required: true
        type: string
      test-path:
        description: "Path to test project (empty = skip tests)"
        required: false
        type: string
        default: ""
      coverage-threshold:
        description: "Minimum code coverage percentage"
        required: false
        type: number
        default: 0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}

      - name: Build
        run: |
          dotnet build ${{ inputs.project-path }} \
            --configuration Release \
            --no-restore \
            /property:GenerateFullPaths=true

      - name: Test
        if: inputs.test-path != ''
        run: |
          dotnet test ${{ inputs.test-path }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage
        if: inputs.test-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 5
