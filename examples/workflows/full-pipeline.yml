name: "Full Pipeline (Build → Docker → Deploy → APIM)"

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: "8.0"
      project-path:
        required: true
        type: string
      test-path:
        required: false
        type: string
        default: ""
      docker-context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "dockerfile"
      service-name:
        required: true
        type: string
      k8s-overlay-path:
        required: false
        type: string
        default: "k8s/overlays"
      enable-apim-import:
        required: false
        type: boolean
        default: false
      openapi-url:
        required: false
        type: string
        default: ""
      api-path:
        required: false
        type: string
        default: ""

jobs:
  # ─── Resolve Environment ────────────────────────────────
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      acr-login-server: ${{ steps.env.outputs.acr }}
      aks-cluster: ${{ steps.env.outputs.aks-cluster }}
      aks-rg: ${{ steps.env.outputs.aks-rg }}
      apim-name: ${{ steps.env.outputs.apim-name }}
      apim-rg: ${{ steps.env.outputs.apim-rg }}
    steps:
      - name: Map branch to environment
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          case "$BRANCH" in
            dev)     ENV="dev" ;;
            qa)      ENV="qa" ;;
            staging) ENV="staging" ;;
            prod)    ENV="prod" ;;
            *)       ENV="dev" ;;
          esac
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "acr=${{ vars.ACR_LOGIN_SERVER }}" >> "$GITHUB_OUTPUT"
          echo "aks-cluster=${{ vars[format('AKS_CLUSTER_NAME_{0}', env.upper(ENV))] }}" >> "$GITHUB_OUTPUT"
          echo "aks-rg=${{ vars[format('AKS_RESOURCE_GROUP_{0}', env.upper(ENV))] }}" >> "$GITHUB_OUTPUT"
          echo "apim-name=${{ vars[format('APIM_NAME_{0}', env.upper(ENV))] }}" >> "$GITHUB_OUTPUT"
          echo "apim-rg=${{ vars[format('APIM_RESOURCE_GROUP_{0}', env.upper(ENV))] }}" >> "$GITHUB_OUTPUT"

  # ─── Build & Test ───────────────────────────────────────
  build:
    needs: resolve-env
    uses: ./.github/workflows/build-test.yml
    with:
      dotnet-version: ${{ inputs.dotnet-version }}
      project-path: ${{ inputs.project-path }}
      test-path: ${{ inputs.test-path }}

  # ─── Docker Build & Push ────────────────────────────────
  docker:
    needs: [resolve-env, build]
    uses: ./.github/workflows/docker-build-push.yml
    with:
      docker-context: ${{ inputs.docker-context }}
      dockerfile: ${{ inputs.dockerfile }}
      service-name: ${{ inputs.service-name }}
      environment: ${{ needs.resolve-env.outputs.environment }}
      acr-login-server: ${{ needs.resolve-env.outputs.acr-login-server }}
    secrets: inherit

  # ─── Deploy to AKS ─────────────────────────────────────
  deploy:
    needs: [resolve-env, docker]
    uses: ./.github/workflows/deploy-aks.yml
    with:
      environment: ${{ needs.resolve-env.outputs.environment }}
      service-name: ${{ inputs.service-name }}
      image-tag: ${{ needs.docker.outputs.image-tag }}
      k8s-overlay-path: ${{ inputs.k8s-overlay-path }}
      aks-cluster-name: ${{ needs.resolve-env.outputs.aks-cluster }}
      aks-resource-group: ${{ needs.resolve-env.outputs.aks-rg }}
    secrets: inherit

  # ─── APIM Import (optional) ────────────────────────────
  apim:
    needs: [resolve-env, deploy]
    if: inputs.enable-apim-import
    uses: ./.github/workflows/apim-import.yml
    with:
      environment: ${{ needs.resolve-env.outputs.environment }}
      service-name: ${{ inputs.service-name }}
      openapi-url: ${{ inputs.openapi-url }}
      apim-name: ${{ needs.resolve-env.outputs.apim-name }}
      apim-resource-group: ${{ needs.resolve-env.outputs.apim-rg }}
      api-path: ${{ inputs.api-path }}
    secrets: inherit
