name: "Docker Build & Push to ACR"

on:
  workflow_call:
    inputs:
      docker-context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: "dockerfile"
      service-name:
        description: "Image name (without registry prefix)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
      acr-login-server:
        description: "ACR login server"
        required: true
        type: string
    outputs:
      image-tag:
        description: "Full image tag that was pushed"
        value: ${{ jobs.docker-build.outputs.image-tag }}
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.full-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr-login-server }}

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          TAG="${{ inputs.environment }}-${BRANCH}-${SHORT_SHA}"
          FULL_TAG="${{ inputs.acr-login-server }}/${{ inputs.service-name }}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full-tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"
          echo "📦 Image: ${FULL_TAG}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.full-tag }}
            ${{ inputs.acr-login-server }}/${{ inputs.service-name }}:${{ inputs.environment }}-latest

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full-tag }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
