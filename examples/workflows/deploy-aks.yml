name: "Deploy to AKS"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev/qa/staging/prod)"
        required: true
        type: string
      service-name:
        description: "Service name for Kustomize overlay"
        required: true
        type: string
      image-tag:
        description: "Full image tag to deploy"
        required: true
        type: string
      k8s-overlay-path:
        description: "Path to Kustomize overlays directory"
        required: false
        type: string
        default: "k8s/overlays"
      aks-cluster-name:
        description: "AKS cluster name"
        required: true
        type: string
      aks-resource-group:
        description: "AKS resource group"
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ inputs.aks-resource-group }} \
            --name ${{ inputs.aks-cluster-name }} \
            --overwrite-existing

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in Kustomize
        run: |
          cd ${{ inputs.k8s-overlay-path }}/${{ inputs.environment }}
          kustomize edit set image \
            *=${{ inputs.image-tag }}

      - name: Deploy with Kustomize
        run: |
          kustomize build ${{ inputs.k8s-overlay-path }}/${{ inputs.environment }} \
            | kubectl apply -f -

      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} \
            -n ${{ inputs.environment }} \
            --timeout=300s

      - name: Show deployment status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ inputs.environment }} -l app=${{ inputs.service-name }}
          echo ""
          echo "=== Events ==="
          kubectl get events -n ${{ inputs.environment }} \
            --sort-by='.lastTimestamp' | tail -20
