name: "APIM Import OpenAPI"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
      service-name:
        description: "API name in APIM"
        required: true
        type: string
      openapi-url:
        description: "URL to fetch OpenAPI spec from (e.g. http://service/swagger/v1/swagger.json)"
        required: true
        type: string
      apim-name:
        description: "APIM instance name"
        required: true
        type: string
      apim-resource-group:
        description: "APIM resource group"
        required: true
        type: string
      api-path:
        description: "API path prefix in APIM"
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true

jobs:
  import:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Wait for service health
        run: |
          echo "Waiting for service to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf "${{ inputs.openapi-url }}" > /dev/null 2>&1; then
              echo "✅ Service is healthy"
              break
            fi
            echo "  Attempt $i/30 — waiting..."
            sleep 10
          done

      - name: Import OpenAPI to APIM
        run: |
          az apim api import \
            --resource-group ${{ inputs.apim-resource-group }} \
            --service-name ${{ inputs.apim-name }} \
            --api-id ${{ inputs.service-name }} \
            --path ${{ inputs.api-path }} \
            --specification-format OpenApiJson \
            --specification-url "${{ inputs.openapi-url }}" \
            --display-name "${{ inputs.service-name }}" \
            --protocols https

          echo "✅ API imported to APIM: ${{ inputs.service-name }}"
